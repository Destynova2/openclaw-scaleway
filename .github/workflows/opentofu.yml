name: Deploy

on:
  push:
    branches: [main]
    paths: ['terraform/**', 'containers/**', '.github/workflows/**']
  pull_request:
    branches: [main]
    paths: ['terraform/**', 'containers/**', '.github/workflows/**']
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
      confirm_destroy:
        description: 'Type DESTROY to confirm (required for destroy)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  # S3 backend credentials — cle dediee avec default_project_id = projet du bucket de state
  # (le protocole S3 scope les requetes au default_project_id de la cle API)
  AWS_ACCESS_KEY_ID: ${{ secrets.SCW_STATE_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_STATE_SECRET_KEY }}
  # Scaleway provider credentials (via TF variables)
  TF_VAR_scw_access_key: ${{ secrets.SCW_ACCESS_KEY }}
  TF_VAR_scw_secret_key: ${{ secrets.SCW_SECRET_KEY }}
  TF_VAR_scw_organization_id: ${{ secrets.SCW_ORGANIZATION_ID }}
  # App config
  TF_VAR_admin_ip_cidr: ${{ secrets.TF_VAR_admin_ip_cidr }}
  TF_VAR_admin_email: ${{ secrets.TF_VAR_admin_email }}
  TF_VAR_domain_name: ${{ secrets.TF_VAR_domain_name }}
  TF_VAR_pomerium_idp_client_id: ${{ secrets.TF_VAR_pomerium_idp_client_id }}
  TF_VAR_pomerium_idp_client_secret: ${{ secrets.TF_VAR_pomerium_idp_client_secret }}
  TF_VAR_openclaw_version: ${{ secrets.TF_VAR_openclaw_version }}
  TF_VAR_encryption_passphrase: ${{ secrets.TF_VAR_encryption_passphrase }}
  TF_VAR_state_project_id: ${{ secrets.TF_VAR_state_project_id }}
  TF_VAR_github_token: ${{ secrets.TF_VAR_github_token }}
  TF_VAR_github_owner: ${{ github.repository_owner }}
  TF_VAR_github_repository: ${{ github.event.repository.name }}

jobs:
  # ── Path detection (push + dispatch) ────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.event.inputs.action != 'destroy'
    outputs:
      caddy: ${{ steps.changes.outputs.caddy }}
      pomerium: ${{ steps.changes.outputs.pomerium }}
      openclaw: ${{ steps.changes.outputs.openclaw }}
      openclaw_cli: ${{ steps.changes.outputs.openclaw_cli }}
      token_guard: ${{ steps.changes.outputs.token_guard }}
      autopair: ${{ steps.changes.outputs.autopair }}
      terraform: ${{ steps.changes.outputs.terraform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          # workflow_dispatch ou premier push : tout rebuilder
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            for key in caddy pomerium openclaw openclaw_cli token_guard autopair terraform; do
              echo "$key=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          echo "caddy=$(echo "$CHANGED" | grep -q '^containers/Containerfile\.caddy$' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "pomerium=$(echo "$CHANGED" | grep -q '^containers/Containerfile\.pomerium$' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "openclaw=$(echo "$CHANGED" | grep -qE '^containers/(Containerfile\.openclaw|\.trivyignore)$' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "openclaw_cli=$(echo "$CHANGED" | grep -q '^containers/Containerfile\.openclaw-cli$' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "token_guard=$(echo "$CHANGED" | grep -qE '^containers/(Containerfile\.token-guard|token-guard/)' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "autopair=$(echo "$CHANGED" | grep -qE '^containers/(Containerfile\.autopair|autopair/)' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "terraform=$(echo "$CHANGED" | grep -q '^terraform/' && echo true || echo false)" >> "$GITHUB_OUTPUT"

  # ── Container builds (parallel matrix) ──────────────────────────────
  # Chaque entree verifie que le registry endpoint existe (vide au premier deploy,
  # rempli par tofu apply). Si vide → skip gracieux (success), apply peut tourner.
  build:
    name: Build ${{ matrix.name }}
    needs: detect-changes
    if: needs.detect-changes.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Caddy
            key: caddy
            image: caddy-ratelimit
            file: Containerfile.caddy
            registry: main
            tag: latest
            trivyignore: ''
            timeout: 30
          - name: Pomerium
            key: pomerium
            image: pomerium
            file: Containerfile.pomerium
            registry: pomerium
            tag: ''
            version_arg: POMERIUM_VERSION
            trivyignore: containers/.trivyignore
            timeout: 15
          - name: OpenClaw
            key: openclaw
            image: openclaw-tools
            file: Containerfile.openclaw
            registry: main
            tag: latest
            trivyignore: containers/.trivyignore
            timeout: 30
          - name: OpenClaw CLI
            key: openclaw_cli
            image: openclaw-cli
            file: Containerfile.openclaw-cli
            registry: main
            tag: latest
            trivyignore: ''
            timeout: 15
          - name: Token Guard
            key: token_guard
            image: token-guard
            file: Containerfile.token-guard
            registry: main
            tag: latest
            trivyignore: ''
            timeout: 30
          - name: Autopair
            key: autopair
            image: autopair
            file: Containerfile.autopair
            registry: main
            tag: latest
            trivyignore: ''
            timeout: 30
    steps:
      - name: Check if build needed
        id: check
        env:
          CHANGES: ${{ toJSON(needs.detect-changes.outputs) }}
          KEY: ${{ matrix.key }}
          REGISTRY_MAIN: ${{ secrets.SCW_REGISTRY_ENDPOINT }}
          REGISTRY_POMERIUM: ${{ secrets.SCW_POMERIUM_REGISTRY_ENDPOINT }}
          REGISTRY_TYPE: ${{ matrix.registry }}
        run: |
          VALUE=$(echo "$CHANGES" | jq -r --arg k "$KEY" '.[$k]')
          if [ "$VALUE" != "true" ]; then
            echo "::notice::No changes for $KEY — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$REGISTRY_TYPE" = "pomerium" ]; then
            ENDPOINT="$REGISTRY_POMERIUM"
          else
            ENDPOINT="$REGISTRY_MAIN"
          fi
          if [ -z "$ENDPOINT" ]; then
            echo "::notice::Registry endpoint not configured — skipping (first deploy)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: steps.check.outputs.skip != 'true'

      - name: Login to Scaleway Container Registry
        if: steps.check.outputs.skip != 'true'
        run: echo "${{ secrets.SCW_SECRET_KEY }}" | docker login "${{ steps.check.outputs.endpoint }}" -u "${{ secrets.SCW_ACCESS_KEY }}" --password-stdin

      - name: Resolve image tag
        if: steps.check.outputs.skip != 'true'
        id: tag
        run: |
          if [ -n "${{ matrix.tag }}" ]; then
            echo "value=${{ matrix.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(grep '^ARG ${{ matrix.version_arg }}=' containers/${{ matrix.file }} | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        if: steps.check.outputs.skip != 'true'
        run: docker build -t "${{ steps.check.outputs.endpoint }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}" -f containers/${{ matrix.file }} containers/

      - name: Trivy vulnerability scan
        if: steps.check.outputs.skip != 'true'
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
        with:
          image-ref: '${{ steps.check.outputs.endpoint }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true
          trivyignores: ${{ matrix.trivyignore }}

      - name: Push image
        if: steps.check.outputs.skip != 'true'
        run: docker push "${{ steps.check.outputs.endpoint }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}"

  # ── OpenTofu Plan (PRs only) ────────────────────────────────────────
  plan:
    name: OpenTofu Plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: "1.8"

      - name: OpenTofu Init
        run: tofu init

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive

      - name: OpenTofu Validate
        run: tofu validate

      - name: OpenTofu Test
        run: tofu test

      - name: OpenTofu Plan
        id: plan
        run: tofu plan -no-color -out=plan.tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan-output.txt', 'utf8').slice(0, 60000);
            const body = `#### OpenTofu Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`
            ${plan}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tfplan
          path: terraform/plan.tfplan
          retention-days: 5

  # ── OpenTofu Apply (push to main, after builds) ─────────────────────
  # Toujours apply apres les builds — meme pour des changements containers-only.
  # Si aucun attribut Terraform n'a change, apply est un no-op rapide.
  # Les container resources utilisent _IMAGE_HASH pour forcer le redeploy
  # quand un Containerfile change (meme si le tag d'image est identique).
  apply:
    name: OpenTofu Apply
    needs: [detect-changes, build]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.detect-changes.result == 'success' &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: "1.8"

      - name: OpenTofu Init
        run: tofu init

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive

      - name: OpenTofu Validate
        run: tofu validate

      - name: OpenTofu Test
        run: tofu test

      - name: OpenTofu Plan
        run: tofu plan -no-color -out=plan.tfplan

      - name: OpenTofu Apply
        run: tofu apply plan.tfplan

  # ── Drift Detection (weekly schedule) ───────────────────────────────
  drift-detect:
    name: Drift Detection
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'schedule'
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: "1.8"

      - name: OpenTofu Init
        run: tofu init

      - name: Detect Drift
        id: drift
        run: tofu plan -detailed-exitcode -no-color -out=drift.tfplan 2>&1 | tee drift-output.txt
        continue-on-error: true

      - name: Create issue on drift
        if: steps.drift.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const drift = fs.readFileSync('terraform/drift-output.txt', 'utf8').slice(0, 60000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔀 Infrastructure drift detected',
              body: `Drift detected during scheduled plan.\n\n<details><summary>Plan output</summary>\n\n\`\`\`\n${drift}\n\`\`\`\n</details>`,
              labels: ['infrastructure', 'drift']
            });

  # ── OpenTofu Destroy (manual only, double confirmation) ──────────
  destroy:
    name: OpenTofu Destroy
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'destroy' &&
      github.event.inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: "1.8"

      - name: OpenTofu Init
        run: tofu init

      - name: Remove protected and CI-critical resources from state
        run: |
          # prevent_destroy resources (survivent au destroy, reimportees ou recrees au prochain apply)
          tofu state rm 'scaleway_domain_registration.grob_ninja[0]' || true
          tofu state rm 'scaleway_account_project.openclaw' || true
          tofu state rm 'tls_private_key.admin' || true
          tofu state rm 'scaleway_vpc_private_network.openclaw' || true
          # CI credentials — garder les cles IAM cicd et les GitHub secrets vivants
          # pour que le provider Scaleway fonctionne et que le state puisse etre sauvegarde en S3
          tofu state rm 'module.iam_cicd' || true
          tofu state list 2>/dev/null | grep 'github_actions_secret' | while read -r addr; do
            tofu state rm "$addr" || true
          done

      - name: OpenTofu Destroy
        run: tofu destroy -auto-approve

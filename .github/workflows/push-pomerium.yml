name: Push Pomerium Image

on:
  workflow_dispatch:
    inputs:
      pomerium_version:
        description: "Pomerium version tag (e.g. v0.32.0)"
        required: true
        default: "v0.32.0"

concurrency:
  group: push-pomerium
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY_ENDPOINT: ${{ secrets.SCW_POMERIUM_REGISTRY_ENDPOINT }}

jobs:
  push:
    name: Pull & Push Pomerium
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Login to Scaleway Container Registry
        run: echo "${{ secrets.SCW_SECRET_KEY }}" | docker login "$REGISTRY_ENDPOINT" -u "${{ secrets.SCW_ACCESS_KEY }}" --password-stdin

      - name: Pull Pomerium from Docker Hub
        run: docker pull "docker.io/pomerium/pomerium:${{ inputs.pomerium_version }}"

      - name: Tag for Scaleway registry
        run: docker tag "docker.io/pomerium/pomerium:${{ inputs.pomerium_version }}" "$REGISTRY_ENDPOINT/pomerium:${{ inputs.pomerium_version }}"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
        with:
          image-ref: '${{ env.REGISTRY_ENDPOINT }}/pomerium:${{ inputs.pomerium_version }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Push to Scaleway registry
        run: docker push "$REGISTRY_ENDPOINT/pomerium:${{ inputs.pomerium_version }}"

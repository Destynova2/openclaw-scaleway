name: Build Pomerium Image

on:
  workflow_dispatch:

concurrency:
  group: build-pomerium
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY_ENDPOINT: ${{ secrets.SCW_POMERIUM_REGISTRY_ENDPOINT }}
  IMAGE_NAME: pomerium

jobs:
  build-push:
    name: Build & Push Pomerium
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Login to Scaleway Container Registry
        run: echo "${{ secrets.SCW_SECRET_KEY }}" | docker login "$REGISTRY_ENDPOINT" -u "${{ secrets.SCW_ACCESS_KEY }}" --password-stdin

      - name: Extract Pomerium version from Containerfile
        id: version
        run: echo "tag=$(grep '^ARG POMERIUM_VERSION=' containers/Containerfile.pomerium | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t "$REGISTRY_ENDPOINT/$IMAGE_NAME:${{ steps.version.outputs.tag }}" -f containers/Containerfile.pomerium containers/

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
        with:
          image-ref: '${{ env.REGISTRY_ENDPOINT }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Push image
        run: docker push "$REGISTRY_ENDPOINT/$IMAGE_NAME:${{ steps.version.outputs.tag }}"
